name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase db push --linked --password "${{ secrets.SUPABASE_DB_PASSWORD }}" --yes

  functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy admin-stats --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy admin-users --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy ga4-analytics --project-ref nxztzehgnkdmluogxehi --no-verify-jwt
          supabase functions deploy public-booking --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy send-clinic-invite --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy submit-clinic-signup --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy track-public-analytics --project-ref nxztzehgnkdmluogxehi
          supabase functions deploy whatsapp-ai-agent --project-ref nxztzehgnkdmluogxehi
  # Vercel deploys automatically via GitHub integration on the same push.
  # No explicit step needed — it runs in parallel with this job.
